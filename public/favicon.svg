<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Sun -->
  <circle cx="23" cy="9" r="3.5" fill="#FBBF24"/>
  <line x1="23" y1="3.5" x2="23" y2="2" stroke="#FBBF24" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="23" y1="15.5" x2="23" y2="17" stroke="#FBBF24" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16.5" y1="9" x2="15" y2="9" stroke="#FBBF24" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="29.5" y1="9" x2="31" y2="9" stroke="#FBBF24" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19.4" y1="5.4" x2="18.3" y2="4.3" stroke="#FBBF24" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="26.6" y1="12.6" x2="27.7" y2="13.7" stroke="#FBBF24" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="26.6" y1="5.4" x2="27.7" y2="4.3" stroke="#FBBF24" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19.4" y1="12.6" x2="18.3" y2="13.7" stroke="#FBBF24" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Panel frame -->
  <rect x="2" y="14" width="20" height="13" rx="1.5" fill="#1E3A5F"/>

  <!-- Solar cells -->
  <rect x="3.5" y="15.5" width="5.5" height="4" rx="0.5" fill="#2563EB"/>
  <rect x="10"  y="15.5" width="5.5" height="4" rx="0.5" fill="#2563EB"/>
  <rect x="16.5" y="15.5" width="4"   height="4" rx="0.5" fill="#2563EB"/>
  <rect x="3.5" y="20.5" width="5.5" height="4" rx="0.5" fill="#2563EB"/>
  <rect x="10"  y="20.5" width="5.5" height="4" rx="0.5" fill="#2563EB"/>
  <rect x="16.5" y="20.5" width="4"   height="4" rx="0.5" fill="#2563EB"/>

  <!-- Cell shine -->
  <rect x="3.5" y="15.5" width="5.5" height="1.2" rx="0.4" fill="white" opacity="0.2"/>
  <rect x="10"  y="15.5" width="5.5" height="1.2" rx="0.4" fill="white" opacity="0.2"/>
  <rect x="16.5" y="15.5" width="4"   height="1.2" rx="0.4" fill="white" opacity="0.2"/>
  <rect x="3.5" y="20.5" width="5.5" height="1.2" rx="0.4" fill="white" opacity="0.2"/>
  <rect x="10"  y="20.5" width="5.5" height="1.2" rx="0.4" fill="white" opacity="0.2"/>
  <rect x="16.5" y="20.5" width="4"   height="1.2" rx="0.4" fill="white" opacity="0.2"/>

  <!-- Support pole -->
  <rect x="10.5" y="27" width="3" height="2.5" rx="0.5" fill="#1E3A5F"/>
  <rect x="7"    y="29" width="10" height="1.5" rx="0.75" fill="#1E3A5F"/>
</svg>
